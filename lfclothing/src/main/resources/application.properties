spring.application.name=lfclothing

# Banco de Dados PostgreSQL Local
spring.datasource.url=jdbc:postgresql://localhost:5432/lfclothing
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracoes do Hibernate (JPA) para criar tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuracoes de JWT (Chave forte hardcoded apenas para o MVP, expiracao em 24h)
